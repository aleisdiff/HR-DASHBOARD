services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-dashboard-backend
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-dashboard-frontend
    working_dir: /app
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  backend_vendor:
  frontend_node_modules: